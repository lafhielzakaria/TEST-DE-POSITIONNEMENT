<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reservations</title>
</head>
<body>
    <!-- <link rel="stylesheet" href="style.css"> -->
    <form>
        <input type="text" placeholder="Nom comple" required>
        <input type="text" placeholder="Email" required>
        <input type="tel" placeholder="Téléphone">
        <select name="" id="">
            <option value="">Select a match</option>
            <option value="FC KOORAWAVE vs Raja Club — 15/03/2025">FC KOORAWAVE vs Raja Club — 15/03/2025</option>
            <option value="FC KOORAWAVE vs Wydad AC — 22/03/2025">FC KOORAWAVE vs Wydad AC — 22/03/2025</option>
            <option value="FC KOORAWAVE vs AS FAR — 05/04/2025">FC KOORAWAVE vs AS FAR — 05/04/2025</option>
        </select>
        Catégorie de place
        <input type="radio" placeholder="Tribune">
        <input type="radio" placeholder="Virage">
        <input type="radio" placeholder="Pelouse">
        <p>Nombre de tickets</p>
        <input type="range" min="1" max="10" required>
        <textarea placeholder="Commentaire" name="" id=""></textarea>
        J'accepte les conditions générales <input type="checkbox">
        <button id="reservation-btn" type="submit">Réserver mon ticket</button>
    </form>
</body>

</html>
